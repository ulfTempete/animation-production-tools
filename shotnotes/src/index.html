<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShotNotes</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="panel">

  <div class="panel-header">
    <div class="panel-title-row">
      <span class="panel-title">ShotNotes</span>
      <div class="panel-icons">
        <button class="icon-btn" id="btn-import-frameio" title="Import Frame.io CSV">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
            <path d="M2 10v2h10v-2M7 2v7M4.5 6.5L7 9l2.5-2.5"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-search-global" title="Search all notes">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
            <circle cx="6" cy="6" r="3.5"/><path d="M8.5 8.5L12 12"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-settings" title="Settings">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
            <circle cx="7" cy="7" r="1.5"/>
            <path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.9 2.9l1.4 1.4M9.7 9.7l1.4 1.4M2.9 11.1l1.4-1.4M9.7 4.3l1.4-1.4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="comp-bar">
      <div class="comp-dot" id="comp-status-dot"></div>
      <span class="comp-name" id="comp-name">No active comp</span>
      <span class="comp-tc" id="comp-tc">--:--:--:--</span>
    </div>

    <div class="tab-row">
      <button class="tab active" data-tab="comp">Comp</button>
      <button class="tab" data-tab="global">Global</button>
      <button class="tab" data-tab="project">Project</button>
    </div>
  </div>

  <div class="tab-content active" id="tab-comp">
    <div class="search-bar">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
        <circle cx="6" cy="6" r="3.5"/><path d="M8.5 8.5L12 12"/>
      </svg>
      <input class="search-input" id="comp-search" placeholder="Filter notes…" autocomplete="off"/>
    </div>
    <div class="notes-list" id="comp-notes-list">
      <div class="empty-state" id="comp-empty">No notes for this comp yet.</div>
    </div>
    <div class="compose-area">
      <div class="compose-top">
        <div class="color-dot dot-orange selected" data-color="orange"></div>
        <div class="color-dot dot-blue"   data-color="blue"></div>
        <div class="color-dot dot-red"    data-color="red"></div>
        <div class="color-dot dot-green"  data-color="green"></div>
        <div class="color-dot dot-grey"   data-color="grey"></div>
        <div class="tc-stamp" id="comp-tc-stamp">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
            <circle cx="6" cy="6" r="4.5"/><path d="M6 3.5v2.5l1.5 1"/>
          </svg>
          <span id="comp-stamp-tc">--:--:--:--</span>
        </div>
      </div>
      <textarea class="compose-input" id="comp-note-input" rows="3" placeholder="Add a note…"></textarea>
      <div class="compose-actions">
        <button class="btn-add" id="comp-add-btn">Add</button>
        <button class="btn-ghost" id="comp-marker-only-btn">+ Marker</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-global">
    <div class="search-bar">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3">
        <circle cx="6" cy="6" r="3.5"/><path d="M8.5 8.5L12 12"/>
      </svg>
      <input class="search-input" id="global-search" placeholder="Filter notes…" autocomplete="off"/>
    </div>
    <div class="notes-list" id="global-notes-list">
      <div class="empty-state" id="global-empty">No global notes yet.</div>
    </div>
    <div class="compose-area">
      <div class="compose-top">
        <div class="color-dot dot-orange selected" data-color="orange"></div>
        <div class="color-dot dot-blue"   data-color="blue"></div>
        <div class="color-dot dot-red"    data-color="red"></div>
        <div class="color-dot dot-green"  data-color="green"></div>
        <div class="color-dot dot-grey"   data-color="grey"></div>
      </div>
      <textarea class="compose-input" id="global-note-input" rows="3" placeholder="Project-wide note…"></textarea>
      <div class="compose-actions">
        <button class="btn-add" id="global-add-btn">Add</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-project">
    <div class="notes-list">
      <div class="project-info-card">
        <div class="pi-header">
          <div class="pi-pin"></div>
          <span class="pi-title">Project Info</span>
          <button class="pi-edit-btn" id="pi-edit-btn">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M2 9l6-6 1 1-6 6H2V9zM7 4l1-1 1 1-1 1z"/>
            </svg>
          </button>
        </div>
        <div class="pi-grid" id="pi-grid"></div>
      </div>
    </div>
  </div>

</div>

<input type="file" id="frameio-file-input" accept=".csv" style="display:none"/>
<script>if(typeof CSInterface==="undefined"){CSInterface=function(){this.evalScript=function(s,cb){if(typeof window.__adobe_cep__!=="undefined"){window.__adobe_cep__.evalScript(s,cb);}else if(cb){cb("null");}};};}</script><script src="main.js"></script>
</body>
</html>
